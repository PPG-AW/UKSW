<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1E40AF">
    <title>Asesmen Diagnostik</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .progress-soal {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: var(--white);
            padding: var(--space-sm) var(--space-md);
            border-radius: var(--radius-md);
            margin-bottom: var(--space-md);
            box-shadow: var(--shadow-sm);
        }

        .progress-soal-label {
            font-size: var(--text-sm);
            color: var(--gray-700);
            font-weight: 600;
        }

        .progress-soal-num {
            background-color: var(--primary);
            color: var(--white);
            padding: 4px 12px;
            border-radius: var(--radius-full);
            font-size: var(--text-sm);
            font-weight: 700;
        }

        .soal-card {
            background-color: var(--white);
            border-radius: var(--radius-lg);
            padding: var(--space-lg);
            margin-bottom: var(--space-md);
            box-shadow: var(--shadow-sm);
        }

        .soal-topik {
            display: inline-block;
            background-color: var(--primary-bg-soft);
            color: var(--primary-dark);
            padding: 4px 12px;
            border-radius: var(--radius-full);
            font-size: var(--text-xs);
            font-weight: 600;
            margin-bottom: var(--space-md);
        }

        .soal-pertanyaan {
            font-size: var(--text-base);
            color: var(--gray-900);
            line-height: 1.6;
            margin-bottom: var(--space-lg);
            font-weight: 500;
        }

        .pilihan-list {
            display: flex;
            flex-direction: column;
            gap: var(--space-sm);
        }

        .pilihan-item {
            display: flex;
            align-items: flex-start;
            gap: var(--space-md);
            padding: var(--space-md);
            border: 2px solid var(--gray-300);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: var(--transition);
            background-color: var(--white);
        }

        .pilihan-item:hover {
            border-color: var(--primary-light);
            background-color: var(--primary-bg-soft);
        }

        .pilihan-item.selected {
            border-color: var(--primary);
            background-color: var(--primary-bg-soft);
        }

        .pilihan-label {
            background-color: var(--gray-200);
            color: var(--gray-800);
            width: 32px;
            height: 32px;
            border-radius: var(--radius-full);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: var(--text-sm);
            flex-shrink: 0;
        }

        .pilihan-item.selected .pilihan-label {
            background-color: var(--primary);
            color: var(--white);
        }

        .pilihan-teks {
            font-size: var(--text-sm);
            color: var(--gray-800);
            line-height: 1.5;
            padding-top: 4px;
        }

        .nav-soal {
            display: flex;
            gap: var(--space-sm);
            margin-top: var(--space-lg);
        }

        .indikator-soal {
            display: flex;
            gap: 6px;
            justify-content: center;
            margin-bottom: var(--space-md);
        }

        .indikator-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: var(--gray-300);
        }

        .indikator-dot.answered {
            background-color: var(--success);
        }

        .indikator-dot.current {
            background-color: var(--primary);
            transform: scale(1.5);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <button class="app-header-back" onclick="confirmExit()">
                &larr; Kembali
            </button>
            <h1 class="app-header-title">Asesmen Diagnostik</h1>
            <p class="app-header-subtitle">Tentukan level belajar Anda</p>
        </header>

        <main class="content" id="content">
            <div class="spinner"></div>
            <p class="text-center text-muted">Memuat soal...</p>
        </main>
    </div>

    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/soal-diagnostik.js"></script>
    <script>
        let currentSoal = 0;
        let jawabanSiswa = [];

        window.addEventListener('load', function() {
            setTimeout(initApp, 200);
        });

        function initApp() {
            if (typeof CONFIG === 'undefined' || typeof Utils === 'undefined' ||
                typeof API === 'undefined' || typeof SOAL_DIAGNOSTIK === 'undefined') {
                alert('Gagal memuat aplikasi. Refresh halaman (Ctrl+F5).');
                return;
            }

            if (!Utils.requireLogin()) return;

            // Inisialisasi array jawaban
            jawabanSiswa = new Array(SOAL_DIAGNOSTIK.length).fill(null);

            renderSoal();
        }

        function renderSoal() {
            const soal = SOAL_DIAGNOSTIK[currentSoal];
            const total = SOAL_DIAGNOSTIK.length;
            const isLast = currentSoal === total - 1;
            const isFirst = currentSoal === 0;

            // Indikator dot
            const dotsHtml = SOAL_DIAGNOSTIK.map((_, i) => {
                let cls = 'indikator-dot';
                if (i === currentSoal) cls += ' current';
                else if (jawabanSiswa[i] !== null) cls += ' answered';
                return `<div class="${cls}"></div>`;
            }).join('');

            // Pilihan jawaban
            const pilihanHtml = soal.pilihan.map(p => {
                const isSelected = jawabanSiswa[currentSoal] === p.label;
                return `
                    <div class="pilihan-item ${isSelected ? 'selected' : ''}" data-label="${p.label}">
                        <div class="pilihan-label">${p.label}</div>
                        <div class="pilihan-teks">${p.teks}</div>
                    </div>
                `;
            }).join('');

            document.getElementById('content').innerHTML = `
                <!-- Progress -->
                <div class="progress-soal">
                    <span class="progress-soal-label">Soal</span>
                    <span class="progress-soal-num">${currentSoal + 1} dari ${total}</span>
                </div>

                <!-- Indikator -->
                <div class="indikator-soal">
                    ${dotsHtml}
                </div>

                <!-- Soal -->
                <div class="soal-card">
                    <span class="soal-topik">${soal.topik}</span>
                    <p class="soal-pertanyaan">${soal.pertanyaan}</p>

                    <div class="pilihan-list">
                        ${pilihanHtml}
                    </div>
                </div>

                <!-- Navigasi -->
                <div class="nav-soal">
                    ${!isFirst ? `
                        <button class="btn btn-secondary" onclick="prevSoal()" style="flex: 1;">
                            &larr; Sebelumnya
                        </button>
                    ` : ''}

                    ${!isLast ? `
                        <button class="btn btn-primary" onclick="nextSoal()" style="flex: 1;">
                            Selanjutnya &rarr;
                        </button>
                    ` : `
                        <button class="btn btn-success" onclick="submitDiagnostik()" style="flex: 1;">
                            Selesai &amp; Kirim
                        </button>
                    `}
                </div>
            `;

            // Bind click ke pilihan
            document.querySelectorAll('.pilihan-item').forEach(item => {
                item.addEventListener('click', function() {
                    const label = this.dataset.label;
                    jawabanSiswa[currentSoal] = label;

                    // Re-render untuk update UI
                    renderSoal();
                });
            });
        }

        function nextSoal() {
            if (jawabanSiswa[currentSoal] === null) {
                Utils.toast('Silakan pilih jawaban terlebih dahulu');
                return;
            }

            if (currentSoal < SOAL_DIAGNOSTIK.length - 1) {
                currentSoal++;
                renderSoal();
                window.scrollTo(0, 0);
            }
        }

        function prevSoal() {
            if (currentSoal > 0) {
                currentSoal--;
                renderSoal();
                window.scrollTo(0, 0);
            }
        }

        async function submitDiagnostik() {
            // Cek apakah semua sudah dijawab
            const belumDijawab = jawabanSiswa.findIndex(j => j === null);
            if (belumDijawab !== -1) {
                if (!confirm(`Soal nomor ${belumDijawab + 1} belum dijawab. Lanjut kirim?`)) {
                    currentSoal = belumDijawab;
                    renderSoal();
                    return;
                }
            }

            // Hitung skor
            const hasil = hitungSkorDiagnostik(jawabanSiswa);
            const level = tentukanLevel(hasil.totalSkor);

            Utils.showLoading('Menyimpan hasil...');

            try {
                const user = Utils.getUser();
                const jawabanString = JSON.stringify(jawabanSiswa);

                const result = await API.saveAsesmen(
                    user.id,
                    'diagnostik',
                    hasil.totalSkor,
                    jawabanString,
                    `Level: ${level}`
                );

                Utils.hideLoading();

                if (!result.success) {
                    Utils.toast('Gagal menyimpan: ' + (result.error || 'Unknown error'));
                    return;
                }

                // Simpan ke localStorage untuk halaman hasil
                localStorage.setItem('diagnostik_hasil', JSON.stringify({
                    skor: hasil.totalSkor,
                    level: level,
                    detail: hasil.detail,
                    timestamp: Utils.timestamp()
                }));

                // Redirect ke halaman hasil
                window.location.href = 'hasil-diagnostik.html';

            } catch (error) {
                Utils.hideLoading();
                Utils.toast('Error: ' + error.message);
                console.error(error);
            }
        }

        function confirmExit() {
            const adaJawaban = jawabanSiswa.some(j => j !== null);
            if (adaJawaban) {
                if (confirm('Jawaban yang sudah diisi akan hilang. Yakin keluar?')) {
                    window.location.href = 'dashboard-siswa.html';
                }
            } else {
                window.location.href = 'dashboard-siswa.html';
            }
        }
    </script>
</body>
</html>
