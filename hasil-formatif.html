<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1E40AF">
    <title>Hasil Formatif</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .hasil-hero {
            color: var(--white);
            padding: var(--space-xl) var(--space-md);
            text-align: center;
            border-radius: var(--radius-lg);
            margin-bottom: var(--space-md);
        }

        .hasil-hero.lulus {
            background: linear-gradient(135deg, var(--success) 0%, #15803D 100%);
        }

        .hasil-hero.remedial {
            background: linear-gradient(135deg, var(--red) 0%, var(--red-dark) 100%);
        }

        .skor-circle {
            width: 140px;
            height: 140px;
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0 auto var(--space-md);
            border: 4px solid rgba(255, 255, 255, 0.3);
        }

        .skor-value {
            font-size: 48px;
            font-weight: 800;
            line-height: 1;
        }

        .skor-label {
            font-size: var(--text-xs);
            opacity: 0.9;
            margin-top: 4px;
        }

        .status-text {
            font-size: var(--text-2xl);
            font-weight: 800;
            letter-spacing: 1px;
            margin-bottom: var(--space-xs);
        }

        .status-desc {
            font-size: var(--text-base);
            opacity: 0.95;
        }

        .detail-item {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: var(--space-sm) 0;
            border-bottom: 1px solid var(--gray-200);
            gap: var(--space-sm);
        }

        .detail-item:last-child {
            border-bottom: none;
        }

        .detail-info {
            flex: 1;
            min-width: 0;
        }

        .detail-num {
            font-size: var(--text-xs);
            color: var(--gray-500);
            font-weight: 700;
            margin-bottom: 2px;
        }

        .detail-topik {
            font-size: var(--text-sm);
            color: var(--gray-800);
            font-weight: 500;
            margin-bottom: 2px;
        }

        .detail-pembahasan {
            font-size: var(--text-xs);
            color: var(--gray-600);
            margin-top: 4px;
            line-height: 1.5;
        }

        .detail-status {
            font-size: var(--text-xs);
            font-weight: 700;
            padding: 4px 10px;
            border-radius: var(--radius-full);
            flex-shrink: 0;
            min-width: 60px;
            text-align: center;
        }

        .detail-status.benar {
            background-color: var(--success-bg);
            color: var(--success);
        }

        .detail-status.salah {
            background-color: var(--red-bg);
            color: var(--red-dark);
        }

        .action-card {
            background-color: var(--white);
            border-radius: var(--radius-lg);
            padding: var(--space-lg);
            box-shadow: var(--shadow-sm);
            margin-bottom: var(--space-md);
            text-align: center;
        }

        .action-icon {
            width: 60px;
            height: 60px;
            margin: 0 auto var(--space-sm);
            border-radius: var(--radius-full);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 800;
        }

        .action-icon.lulus {
            background-color: var(--success-bg);
            color: var(--success);
        }

        .action-icon.remedial {
            background-color: var(--red-bg);
            color: var(--red-dark);
        }

        .action-title {
            font-size: var(--text-lg);
            font-weight: 700;
            color: var(--gray-900);
            margin-bottom: var(--space-xs);
        }

        .action-desc {
            font-size: var(--text-sm);
            color: var(--gray-600);
            line-height: 1.5;
            margin-bottom: var(--space-md);
        }

        .summary-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--space-sm);
            margin-bottom: var(--space-md);
        }

        .summary-stat {
            background-color: var(--white);
            padding: var(--space-md);
            border-radius: var(--radius-md);
            text-align: center;
            box-shadow: var(--shadow-sm);
        }

        .stat-num {
            font-size: var(--text-2xl);
            font-weight: 800;
            line-height: 1;
        }

        .stat-num.success { color: var(--success); }
        .stat-num.danger { color: var(--danger); }

        .stat-label {
            font-size: var(--text-xs);
            color: var(--gray-600);
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1 class="app-header-title">Hasil Asesmen Formatif</h1>
            <p class="app-header-subtitle">Penentuan tindak lanjut belajar</p>
        </header>

        <main class="content" id="content">
            <div class="spinner"></div>
        </main>
    </div>

    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/soal-formatif.js"></script>
    <script>
        window.addEventListener('load', function() {
            setTimeout(initApp, 100);
        });

        function initApp() {
            if (!Utils.requireLogin()) return;

            const hasilStr = localStorage.getItem('formatif_hasil');
            if (!hasilStr) {
                document.getElementById('content').innerHTML = `
                    <div class="alert alert-danger">
                        Tidak ada data hasil formatif. Silakan kerjakan formatif terlebih dahulu.
                    </div>
                    <a href="formatif.html" class="btn btn-primary btn-block">
                        Kerjakan Formatif
                    </a>
                `;
                return;
            }

            const hasil = JSON.parse(hasilStr);
            renderHasil(hasil);
        }

        function renderHasil(hasil) {
            const benarCount = hasil.detail.filter(d => d.benar).length;
            const salahCount = hasil.detail.filter(d => !d.benar).length;
            const isLulus = hasil.status === 'lulus';

            // Detail jawaban
            const detailHtml = hasil.detail.map((d, i) => `
                <div class="detail-item">
                    <div class="detail-info">
                        <div class="detail-num">SOAL ${i + 1} &middot; ${d.bobot} POIN</div>
                        <div class="detail-topik">${d.topik}</div>
                        ${!d.benar ? `
                            <div class="detail-pembahasan">
                                <strong>Pembahasan:</strong> ${d.pembahasan}<br>
                                Jawaban benar: <strong>${d.jawabanBenar}</strong>
                                (Anda jawab: ${d.jawabanUser})
                            </div>
                        ` : ''}
                    </div>
                    <span class="detail-status ${d.benar ? 'benar' : 'salah'}">
                        ${d.benar ? `+${d.bobot}` : '0'}
                    </span>
                </div>
            `).join('');

            // Action card berdasarkan status
            let actionHtml = '';
            if (isLulus) {
                actionHtml = `
                    <div class="action-card">
                        <div class="action-icon lulus">✓</div>
                        <div class="action-title">Selamat! Anda Lulus</div>
                        <div class="action-desc">
                            Skor Anda mencapai target kelulusan (≥75).
                            Sekarang Anda bisa mengerjakan soal Pengayaan untuk
                            memperdalam pemahaman dengan studi kasus aplikatif.
                        </div>
                        <a href="pengayaan.html" class="btn btn-success btn-block btn-large">
                            Lanjut ke Pengayaan
                        </a>
                    </div>
                `;
            } else {
                actionHtml = `
                    <div class="action-card">
                        <div class="action-icon remedial">!</div>
                        <div class="action-title">Belum Mencapai Target</div>
                        <div class="action-desc">
                            Skor Anda belum mencapai 75. Jangan khawatir, ini bagian
                            dari proses belajar. Ikuti Remedial untuk meninjau ulang
                            topik yang masih lemah dan latihan tambahan.
                        </div>
                        <a href="remedial.html" class="btn btn-danger btn-block btn-large">
                            Mulai Remedial
                        </a>
                    </div>
                `;
            }

            document.getElementById('content').innerHTML = `
                <div class="hasil-hero ${isLulus ? 'lulus' : 'remedial'}">
                    <div class="skor-circle">
                        <div class="skor-value">${hasil.skor}</div>
                        <div class="skor-label">SKOR</div>
                    </div>
                    <div class="status-text">${isLulus ? 'LULUS' : 'BELUM LULUS'}</div>
                    <div class="status-desc">
                        ${isLulus ? 'Target tercapai (≥75)' : 'Target: 75 (perlu remedial)'}
                    </div>
                </div>

                <div class="summary-stats">
                    <div class="summary-stat">
                        <div class="stat-num success">${benarCount}</div>
                        <div class="stat-label">Benar</div>
                    </div>
                    <div class="summary-stat">
                        <div class="stat-num danger">${salahCount}</div>
                        <div class="stat-label">Salah</div>
                    </div>
                </div>

                ${actionHtml}

                <div class="card">
                    <h3 class="card-title">Detail Jawaban Per Soal</h3>
                    ${detailHtml}
                </div>

                <button class="btn btn-secondary btn-block mt-md" onclick="window.location.href='dashboard-siswa.html'">
                    Kembali ke Dashboard
                </button>
            `;
        }
    </script>
</body>
</html>
