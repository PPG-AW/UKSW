<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1E40AF">
    <title>Latihan - Simpangan Rata-Rata</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .mode-card {
            background-color: var(--white);
            border: 2px solid var(--gray-300);
            border-radius: var(--radius-lg);
            padding: var(--space-lg);
            margin-bottom: var(--space-md);
            cursor: pointer;
            transition: var(--transition);
        }

        .mode-card:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .mode-card.recommended {
            border-color: var(--primary);
            background-color: var(--primary-bg-soft);
        }

        .mode-badge {
            display: inline-block;
            background-color: var(--primary);
            color: var(--white);
            padding: 2px 10px;
            border-radius: var(--radius-full);
            font-size: var(--text-xs);
            font-weight: 700;
            margin-bottom: var(--space-sm);
        }

        .mode-title {
            font-size: var(--text-lg);
            font-weight: 700;
            color: var(--gray-900);
            margin-bottom: var(--space-xs);
        }

        .mode-desc {
            font-size: var(--text-sm);
            color: var(--gray-600);
            line-height: 1.5;
            margin-bottom: var(--space-sm);
        }

        .mode-features {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .mode-features li {
            font-size: var(--text-sm);
            color: var(--gray-700);
            padding-left: var(--space-md);
            position: relative;
            margin-bottom: 4px;
        }

        .mode-features li::before {
            content: '✓';
            position: absolute;
            left: 0;
            color: var(--success);
            font-weight: 700;
        }

        .mode-arrow {
            margin-top: var(--space-md);
            text-align: right;
            color: var(--primary);
            font-weight: 700;
        }

        .progress-info {
            background-color: var(--yellow-bg);
            border-left: 4px solid var(--yellow-dark);
            padding: var(--space-md);
            border-radius: var(--radius-md);
            margin-bottom: var(--space-md);
            font-size: var(--text-sm);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <button class="app-header-back" onclick="window.location.href='dashboard-siswa.html'">
                &larr; Dashboard
            </button>
            <h1 class="app-header-title">Latihan</h1>
            <p class="app-header-subtitle">Pilih mode latihan</p>
        </header>

        <main class="content" id="content">
            <div class="spinner"></div>
        </main>
    </div>

    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script>
        window.addEventListener('load', function() {
            setTimeout(initApp, 200);
        });

        async function initApp() {
            if (!Utils.requireLogin()) return;

            const user = Utils.getUser();
            let userLevel = 2;

            try {
                const result = await API.getProgress(user.id);
                if (result.success && result.data.level) {
                    userLevel = parseInt(result.data.level);
                }
            } catch (e) {
                console.error(e);
            }

            renderMode(userLevel);
        }

        function renderMode(userLevel) {
            const terbimbingRecommended = userLevel === 1;
            const mandiriRecommended = userLevel >= 2;

            document.getElementById('content').innerHTML = `
                <div class="progress-info">
                    <strong>Level Anda: ${userLevel}</strong><br>
                    ${userLevel === 1
                        ? 'Disarankan mulai dari Latihan Terbimbing yang dilengkapi hint dan template tabel.'
                        : userLevel === 2
                        ? 'Disarankan langsung Latihan Mandiri. Jika butuh bantuan, gunakan Latihan Terbimbing dulu.'
                        : 'Disarankan langsung Latihan Mandiri untuk menguji penguasaan Anda.'}
                </div>

                <a href="latihan-terbimbing.html" class="mode-card ${terbimbingRecommended ? 'recommended' : ''}" style="text-decoration: none; color: inherit; display: block;">
                    ${terbimbingRecommended ? '<span class="mode-badge">DISARANKAN</span>' : ''}
                    <div class="mode-title">Latihan Terbimbing</div>
                    <div class="mode-desc">
                        Soal dilengkapi template tabel dan hint langkah demi langkah.
                        Cocok untuk yang masih perlu bantuan.
                    </div>
                    <ul class="mode-features">
                        <li>Tabel perhitungan sudah disiapkan</li>
                        <li>Hint di setiap langkah</li>
                        <li>Feedback langsung per input</li>
                        <li>5 soal acak dengan generator</li>
                    </ul>
                    <div class="mode-arrow">Mulai Latihan Terbimbing &rarr;</div>
                </a>

                <a href="latihan-mandiri.html" class="mode-card ${mandiriRecommended ? 'recommended' : ''}" style="text-decoration: none; color: inherit; display: block;">
                    ${mandiriRecommended ? '<span class="mode-badge">DISARANKAN</span>' : ''}
                    <div class="mode-title">Latihan Mandiri</div>
                    <div class="mode-desc">
                        Soal tanpa hint atau template. Anda mengerjakan dari nol.
                        Cocok untuk yang sudah paham.
                    </div>
                    <ul class="mode-features">
                        <li>Tanpa template tabel</li>
                        <li>Hanya soal dan input jawaban akhir</li>
                        <li>Feedback setelah submit</li>
                        <li>5 soal acak dengan generator</li>
                    </ul>
                    <div class="mode-arrow">Mulai Latihan Mandiri &rarr;</div>
                </a>
            `;
        }
    </script>
</body>
</html>
