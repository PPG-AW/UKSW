<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1E40AF">
    <title>Hasil Diagnostik</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .hasil-hero {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: var(--white);
            padding: var(--space-xl) var(--space-md);
            text-align: center;
            border-radius: var(--radius-lg);
            margin-bottom: var(--space-md);
        }

        .hasil-hero.level-1 {
            background: linear-gradient(135deg, var(--red) 0%, var(--red-dark) 100%);
        }

        .hasil-hero.level-2 {
            background: linear-gradient(135deg, var(--yellow-dark) 0%, #B45309 100%);
        }

        .hasil-hero.level-3 {
            background: linear-gradient(135deg, var(--blue) 0%, var(--blue-dark) 100%);
        }

        .skor-circle {
            width: 120px;
            height: 120px;
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0 auto var(--space-md);
            border: 4px solid rgba(255, 255, 255, 0.3);
        }

        .skor-value {
            font-size: 36px;
            font-weight: 800;
            line-height: 1;
        }

        .skor-label {
            font-size: var(--text-xs);
            opacity: 0.9;
            margin-top: 4px;
        }

        .level-name {
            font-size: var(--text-2xl);
            font-weight: 700;
            margin-bottom: var(--space-xs);
        }

        .level-judul {
            font-size: var(--text-base);
            opacity: 0.9;
        }

        .detail-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: var(--space-sm) 0;
            border-bottom: 1px solid var(--gray-200);
        }

        .detail-item:last-child {
            border-bottom: none;
        }

        .detail-topik {
            font-size: var(--text-sm);
            color: var(--gray-800);
            flex: 1;
        }

        .detail-status {
            font-size: var(--text-xs);
            font-weight: 700;
            padding: 4px 10px;
            border-radius: var(--radius-full);
        }

        .detail-status.benar {
            background-color: var(--success-bg);
            color: var(--success);
        }

        .detail-status.salah {
            background-color: var(--red-bg);
            color: var(--red-dark);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1 class="app-header-title">Hasil Diagnostik</h1>
            <p class="app-header-subtitle">Penentuan Level Belajar</p>
        </header>

        <main class="content" id="content">
            <div class="spinner"></div>
        </main>
    </div>

    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/soal-diagnostik.js"></script>
    <script>
        window.addEventListener('load', function() {
            setTimeout(initApp, 100);
        });

        function initApp() {
            if (!Utils.requireLogin()) return;

            const hasilStr = localStorage.getItem('diagnostik_hasil');
            if (!hasilStr) {
                document.getElementById('content').innerHTML = `
                    <div class="alert alert-danger">
                        Tidak ada data hasil diagnostik. Silakan kerjakan diagnostik terlebih dahulu.
                    </div>
                    <a href="diagnostik.html" class="btn btn-primary btn-block">
                        Kerjakan Diagnostik
                    </a>
                `;
                return;
            }

            const hasil = JSON.parse(hasilStr);
            renderHasil(hasil);
        }

        function renderHasil(hasil) {
            const levelInfo = getLevelInfo(hasil.level);

            // Detail jawaban
            const detailHtml = hasil.detail.map(d => `
                <div class="detail-item">
                    <span class="detail-topik">${d.topik}</span>
                    <span class="detail-status ${d.benar ? 'benar' : 'salah'}">
                        ${d.benar ? 'BENAR' : 'SALAH'}
                    </span>
                </div>
            `).join('');

            // Tentukan saran berdasarkan level
            let saran = '';
            if (hasil.level === 1) {
                saran = `
                    <strong>Saran untuk Anda:</strong>
                    <ul style="margin: 8px 0 0 20px; padding: 0;">
                        <li>Mulai dari materi prasyarat (nilai mutlak dan operasi bilangan negatif)</li>
                        <li>Pelajari materi utama dengan tempo lebih lambat</li>
                        <li>Manfaatkan latihan terbimbing dengan banyak hint</li>
                    </ul>
                `;
            } else if (hasil.level === 2) {
                saran = `
                    <strong>Saran untuk Anda:</strong>
                    <ul style="margin: 8px 0 0 20px; padding: 0;">
                        <li>Langsung pelajari materi utama</li>
                        <li>Fokus pada langkah perhitungan R-S-M-J-B</li>
                        <li>Kerjakan latihan dengan petunjuk ringkas</li>
                    </ul>
                `;
            } else {
                saran = `
                    <strong>Saran untuk Anda:</strong>
                    <ul style="margin: 8px 0 0 20px; padding: 0;">
                        <li>Pelajari materi utama dengan cepat</li>
                        <li>Eksplorasi studi kasus lanjutan</li>
                        <li>Siap menjadi peer tutor bagi teman lain</li>
                    </ul>
                `;
            }

            document.getElementById('content').innerHTML = `
                <!-- Hero Hasil -->
                <div class="hasil-hero level-${hasil.level}">
                    <div class="skor-circle">
                        <div class="skor-value">${hasil.skor}</div>
                        <div class="skor-label">SKOR</div>
                    </div>
                    <div class="level-name">${levelInfo.label}</div>
                    <div class="level-judul">${levelInfo.judul}</div>
                </div>

                <!-- Deskripsi Level -->
                <div class="card">
                    <h3 class="card-title">Penjelasan Level Anda</h3>
                    <p class="card-body">${levelInfo.deskripsi}</p>
                </div>

                <!-- Detail Jawaban -->
                <div class="card">
                    <h3 class="card-title">Detail Jawaban</h3>
                    ${detailHtml}
                </div>

                <!-- Saran -->
                <div class="alert alert-info">
                    ${saran}
                </div>

                <!-- Aksi -->
                <a href="dashboard-siswa.html" class="btn btn-primary btn-block btn-large">
                    Lanjut ke Pembelajaran
                </a>

                <button class="btn btn-outline btn-block mt-sm" onclick="ulangiDiagnostik()">
                    Ulangi Diagnostik
                </button>
            `;
        }

        function ulangiDiagnostik() {
            if (confirm('Ulangi diagnostik? Hasil sebelumnya tetap tersimpan di database.')) {
                localStorage.removeItem('diagnostik_hasil');
                window.location.href = 'diagnostik.html';
            }
        }
    </script>
</body>
</html>
